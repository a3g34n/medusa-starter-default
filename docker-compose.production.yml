services:
  caddy:
    image: caddy:2-alpine
    container_name: medusa_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - medusa
    networks:
      - medusa_network

  medusa:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: medusa_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Ports are handled by Caddy now, so we don't expose 9000 to the host directly
    # ports:
    #   - "9000:9000"
    expose:
      - "9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - STORE_CORS=${STORE_CORS}
      - ADMIN_CORS=${ADMIN_CORS}
      - AUTH_CORS=${AUTH_CORS}
      # Add other necessary env vars here
    env_file:
      - .env.production
    networks:
      - medusa_network

  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - medusa_network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  medusa_network:
    driver: bridge
